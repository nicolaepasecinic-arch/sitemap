# Production stack for Coolify — frontend (nginx, public) + backend (Node API, internal).
# The frontend proxies /api → backend on the shared compose network, so everything is served
# from ONE domain (design.upqode.com). Postgres is a SEPARATE Coolify resource (set DATABASE_URL).
#
# Both services also join Coolify's predefined `coolify` network so the backend can reach the
# Postgres resource (by its service name) and Traefik can reach the frontend.
#
# In Coolify: New Resource → Docker Compose → point to this file. Set the env vars below in the
# Coolify UI, and map the domain design.upqode.com to the `frontend` service (port 80).

networks:
  # Coolify's shared network (where database resources + the proxy live). Created by Coolify.
  coolify:
    external: true
  # internal network for frontend ↔ backend communication
  internal:
    driver: bridge

services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PGSSL: ${PGSSL:-false}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4}
      OPENAI_CHEAP_MODEL: ${OPENAI_CHEAP_MODEL:-gpt-5.4-mini}
      SCREENSHOTENGINE_API_KEY: ${SCREENSHOTENGINE_API_KEY}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      APP_URL: ${APP_URL}
      CORS_ORIGIN: ${APP_URL}
      PORT: "3000"
    restart: unless-stopped
    # init: reap zombie Chromium processes (Puppeteer can leave defunct children that
    # slowly eat memory). tini becomes PID 1 and cleans them up.
    init: true
    # Memory ceiling so a runaway Chromium restarts THIS container in isolation instead of
    # OOM-killing the whole 4GB host. Generous on purpose (one browser ≈ 400MB + Node);
    # the concurrency lock means only one Chromium runs at a time. Lower if Postgres shares
    # the host and needs more headroom.
    mem_limit: 3g
    healthcheck:
      # Mark the container unhealthy if the API stops responding, so Coolify/Docker can
      # surface it and restart. Uses Node's built-in fetch (Node 22) — no extra tooling.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal   # talk to frontend
      - coolify    # reach the Postgres resource
    expose:
      - "3000"

  frontend:
    build:
      context: .
      args:
        # the app calls <APP_URL>/api/... which hits this same domain; nginx proxies /api → backend
        REACT_APP_API_URL: ${APP_URL}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal   # reach the backend
      - coolify    # reachable by the Traefik proxy
    expose:
      - "80"
