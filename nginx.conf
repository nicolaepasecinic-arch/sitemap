server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 25m;

  # API → backend (same-origin; the React app is built with REACT_APP_API_URL="")
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # AI generation (Puppeteer + model) can take a while
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  # backend-served static (exported markup files)
  location /markup-files/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
  }

  location /moodboard-files/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_read_timeout 120s;
  }

  # cache hashed static assets
  location /static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA + hash routing: serve index.html for unknown paths
  location / {
    try_files $uri /index.html;
  }
}
